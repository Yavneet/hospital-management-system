services:
  # MongoDB Database
  mongodb:
    image: mongo:7-jammy
    container_name: hospital-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: hospital_management
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - hospital-network

  # Backend API
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: hospital-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      CONTAINERIZED: true
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/hospital_management?authSource=admin
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - hospital-network
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hospital-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - hospital-network

volumes:
  mongodb_data:

networks:
  hospital-network:
    driver: bridge